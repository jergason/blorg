############# Site Config
title: Interpreted Dance
tagline: gettup get down
email: hi@jamison.dance
owner_name: Jamison Dance
description: >
  Jamison Dance's blog. Mostly focused on engineering management,
  software design and development, and jokes to himself.
#Comment out url when working locally to resolve base urls correctly
url: https://jamison.dance
favicon: "favicon.ico"
permalink: /:month-:day-:year/:title
theme_config:
  appearance: "auto" # can be "light", "dark" or "auto"
  back_home_text: ".." # customize text for homepage link in post layout
  date_format: "%Y-%m-%d" # customize how date is formatted
  show_description: false # show blog description in home page
#############

###########
#Tech Setup
###########
markdown: kramdown
sass:
  style: compressed

# http://en.wikipedia.org/wiki/List_of_tz_database_time_zones
timezone: America/Denver
future: false

highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag

# social/og config for jekyll-seo-tag
twitter:
  username: jamison_dance
  card: summary_large_image

exclude:
  # Jekyll defaults (re-listed because defining `exclude` overrides them)
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  # local scratch / dev artifacts — kept out of the build and the watcher
  - .playwright-mcp
  - .claude
  - specs
  - bin
  - opencode.jsonc
  - llm-post-tweets.md
  - AGENTS.md
  - CLAUDE.md
  - README.md
  - "redesign-*.png"
  - "*-reference.png"
  - ".og-preview.html"
