---
layout: default
---
<div class="shell">
  <article class="doc">
    {%- include doc_head.html stamp="GENERAL" -%}

    <nav class="crumb" aria-label="Breadcrumb">
      <a href="{{ "/" | relative_url }}">HOME</a>
      <span class="crumb__sep"> / </span>
      <span class="crumb__here">{{ page.title }}</span>
    </nav>

    <div class="post-head">
      <h1 class="post-title">{{ page.title }}</h1>
      {%- if page.description and page.description != "" -%}
        <p class="lede">{{ page.description }}</p>
      {%- endif -%}
    </div>

    <div class="prose">
      {{ content }}
    </div>

    {%- include doc_foot.html readout="PAGE" -%}
  </article>
</div>
