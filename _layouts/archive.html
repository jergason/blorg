---
layout: default
---
{%- capture readout -%}{{ site.posts.size }} ON RECORD{%- endcapture -%}
<div class="shell shell--wide">
  <div class="doc">
    {%- include doc_head.html stamp="INDEX" -%}

    <nav class="crumb" aria-label="Breadcrumb">
      <a href="{{ "/" | relative_url }}">HOME</a>
      <span class="crumb__sep"> / </span>
      <span class="crumb__here">{{ page.title }}</span>
    </nav>

    <div class="post-head">
      <h1 class="post-title">{{ page.title }}</h1>
    </div>

    {%- include posts_by_year.html -%}

    {%- include doc_foot.html readout=readout -%}
  </div>
</div>
